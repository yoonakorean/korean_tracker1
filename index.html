<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 韓文初級 26週關卡挑戰表</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px; /* 手機上縮小 padding */
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            
            /* -- 重點修改開始 -- */
            /* 基礎縮小一點點，設定為大約 1.8倍的預設字體大小 */
            font-size: 1.8rem;
            
            /* 如果你還是覺得太大，可以用這一行（在小螢幕上使用 1.4rem，在普通螢幕上使用 1.8rem）*/
            /* 如果要用這個，要把上面的那行 font-size: 1.8rem 註解掉或是刪掉 */
            /* font-size: 1.4rem; */
            
            /* 強制讓文字在很小的螢幕上縮放 */
            font-size: clamp(1.4rem, 5vw + 1rem, 1.8rem);
            /* 這行公式的意思是：
               1.4rem：字體最小絕對不會小於 1.4rem (適合超級老小手機)
               5vw + 1rem：根據手機寬度 (5% 的視窗寬度 + 1rem) 自動縮放
               1.8rem：字體最大不會大於 1.8rem (在大手機或電腦上) */

            /* 防止文字換行 */
            white-space: nowrap;
            /* 重點修改結束 -- */
        }

        /* 為了配合手機版，建議你也同步加入以下 media query，優化 container */
        @media (min-width: 600px) {
            .container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 韓文初級 26週關卡挑戰表</h1>
    
    <!-- 後面原本的內容不需要更改 -->
</div>

</body>
</html>
    
    <!-- 動態今日任務看板 -->
    <div id="todayBanner" class="today-banner">
        🚀 載入中，準備開始今天的學習冒險！
    </div>

    <table>
        <thead>
            <tr>
                <th>關卡</th>
                <th>👀 看課</th>
                <th>🗣️ 跟讀</th>
                <th>🧠 題目</th>
                <th>✍️ 輸出</th>
                <th>🎙️ 錄音</th>
                <th>關卡進度</th>
                <th>狀態</th>
            </tr>
        </thead>
        <tbody id="trackerTable">
            <!-- 由 JavaScript 自動產生 26 個單元 -->
        </tbody>
    </table>
</div>

<script>
    const totalUnits = 26;
    const tasks = ['watch', 'shadow', 'quiz', 'output', 'record'];
    
    // 初始化表格
    const tbody = document.getElementById('trackerTable');
    for (let i = 1; i <= totalUnits; i++) {
        let tr = document.createElement('tr');
        tr.id = `row-${i}`;
        
        let html = `<td><strong>Unit ${i}</strong></td>`;
        tasks.forEach(task => {
            html += `<td><input type="checkbox" id="${task}-${i}" onchange="updateProgress(${i})"></td>`;
        });
        html += `
            <td>
                <div class="progress-container"><div id="bar-${i}" class="progress-bar"></div></div>
                <span id="text-${i}">0%</span>
            </td>
            <td><span id="badge-${i}" class="badge badge-locked">⚔️ 挑戰中</span></td>
        `;
        tr.innerHTML = html;
        tbody.appendChild(tr);
    }

    // 更新進度與儲存資料
    function updateProgress(unitId) {
        let checkedCount = 0;
        tasks.forEach(task => {
            if (document.getElementById(`${task}-${unitId}`).checked) {
                checkedCount++;
            }
        });

        // 計算百分比
        const percent = (checkedCount / 5) * 100;
        document.getElementById(`bar-${unitId}`).style.width = `${percent}%`;
        document.getElementById(`text-${unitId}`).innerText = `${percent}%`;

        // 更新狀態徽章
        const badge = document.getElementById(`badge-${unitId}`);
        if (percent === 100) {
            badge.innerText = "🎉 已通關！";
            badge.className = "badge badge-done";
        } else {
            badge.innerText = "⚔️ 挑戰中";
            badge.className = "badge badge-locked";
        }

        // 儲存至本地瀏覽器
        saveData();
        // 更新最上方的今日提示
        updateTodayBanner();
    }

    // 更新「今日任務」看板
    function updateTodayBanner() {
        let currentUnit = 1;
        let isAllDone = true;

        for (let i = 1; i <= totalUnits; i++) {
            let checkedCount = 0;
            tasks.forEach(task => {
                if (document.getElementById(`${task}-${i}`).checked) checkedCount++;
            });
            
            if (checkedCount < 5) {
                currentUnit = i;
                isAllDone = false;
                break;
            }
        }

        const banner = document.getElementById('todayBanner');
        if (isAllDone) {
            banner.innerHTML = "👑 🎉 恭喜你！消滅了所有怪獸，成功晉升【韓文初級大師】！ 🎉 👑";
            banner.style.background = "linear-gradient(135deg, #f1c40f, #f39c12)";
        } else {
            banner.innerHTML = `🔥 今日目標：挑戰【 Unit ${currentUnit} 】！目前完成度已達 ${Math.round((document.querySelectorAll(`#row-${currentUnit} input:checked`).length/5)*100)}%，加油！`;
            banner.style.background = "linear-gradient(135deg, #6c5ce7, #a29bfe)";
        }
    }

    // 本地儲存功能
    function saveData() {
        let data = {};
        for (let i = 1; i <= totalUnits; i++) {
            data[i] = {};
            tasks.forEach(task => {
                data[i][task] = document.getElementById(`${task}-${i}`).checked;
            });
        }
        localStorage.setItem('korean_tracker_data', JSON.stringify(data));
    }

    function loadData() {
        let data = JSON.parse(localStorage.getItem('korean_tracker_data'));
        if (data) {
            for (let i = 1; i <= totalUnits; i++) {
                if (data[i]) {
                    tasks.forEach(task => {
                        if (document.getElementById(`${task}-${i}`)) {
                            document.getElementById(`${task}-${i}`).checked = data[i][task] || false;
                        }
                    });
                    updateProgress(i);
                }
            }
        }
        updateTodayBanner();
    }

    // 網頁開啟時載入進度
    window.onload = loadData;
</script>

</body>
</html>
